<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Link Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #1a1a1a; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        h2 { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 25px; }
        .form-card { background-color: #121212; border: 1px solid #2d2d2d; border-radius: 12px; padding: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #e0e0e0; }
        input[type="text"], input[type="url"] { width: 100%; background-color: #2a2a2a; border: 1px solid #444444; border-radius: 6px; padding: 12px; color: #ffffff; outline: none; }
        .link-preview { font-size: 13px; color: #3b82f6; margin-top: 6px; word-break: break-all; }
        .divider { text-align: center; margin: 15px 0; font-size: 12px; color: #888888; font-weight: bold; }
        .file-input-wrapper { background-color: #2a2a2a; border: 1px solid #444444; border-radius: 6px; padding: 12px; display: flex; align-items: center; gap: 10px; }
        input[type="file"] { display: none; }
        .file-label-btn { background-color: #222222; color: #ffffff; padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid #444444; }
        .submit-btn { width: 100%; background-color: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .success-box { display:none; background: #065f46; color: white; padding: 10px; border-radius: 5px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Generate Campaign Link</h2>
        <form class="form-card" id="campaignForm">
            <div class="form-group">
                <label>Short Code Path *</label>
                <input type="text" id="shortCode" placeholder="e.g. specialized-deal" required>
                <div class="link-preview">Link: <span id="liveLink">...</span></div>
            </div>
            <div class="form-group">
                <label>Destination Target URL *</label>
                <input type="url" id="targetUrl" placeholder="https://..." required>
            </div>
            <div class="form-group">
                <label>Option A: Direct Image URL</label>
                <input type="url" id="imageUrl" placeholder="https://...">
            </div>
            <div class="divider">— OR —</div>
            <div class="form-group">
                <label>Option B: Upload Image</label>
                <div class="file-input-wrapper">
                    <label for="imageFile" class="file-label-btn">Choose file</label>
                    <input type="file" id="imageFile" accept="image/*">
                    <span id="fileName" style="color:#757575">No file chosen</span>
                </div>
            </div>
            <div class="form-group">
                <label>Title (Optional)</label>
                <input type="text" id="feedTitle" placeholder="Offer Title">
            </div>
            <div class="form-group">
                <label>Description (Optional)</label>
                <input type="text" id="feedDesc" placeholder="Brief info...">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Generate & Deploy Link</button>
            <div id="successMsg" class="success-box">Campaign Live! Copy the link above.</div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUcEwxRKj4HLaFjVCUu5QAegU1vlxZowo",
            authDomain: "campaign-link-gen.firebaseapp.com",
            databaseURL: "https://campaign-link-gen-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "campaign-link-gen",
            storageBucket: "campaign-link-gen.firebasestorage.app",
            messagingSenderId: "490906728973",
            appId: "1:490906728973:web:7ec5eed156d6f90bd9f344",
            measurementId: "G-41FXXYL6M1"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const storage = getStorage(app);

        const shortCodeInput = document.getElementById('shortCode');
        const liveLink = document.getElementById('liveLink');
        const imageFileInput = document.getElementById('imageFile');

        shortCodeInput.addEventListener('input', () => {
            const val = shortCodeInput.value.trim().replace(/\s+/g, '-').toLowerCase();
            const domain = window.location.origin;
            liveLink.innerText = val ? `${domain}/l/${val}` : "...";
        });

        imageFileInput.addEventListener('change', (e) => {
            document.getElementById('fileName').innerText = e.target.files[0].name;
        });

        document.getElementById('campaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Deploying...";
            btn.disabled = true;

            const shortCode = shortCodeInput.value.trim().replace(/\s+/g, '-').toLowerCase();
            const file = imageFileInput.files[0];
            let imageUrl = document.getElementById('imageUrl').value;

            try {
                if (file) {
                    const storageRef = sRef(storage, 'campaign_images/' + shortCode);
                    const snapshot = await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                await set(ref(database, 'campaigns/' + shortCode), {
                    targetUrl: document.getElementById('targetUrl').value,
                    imageUrl: imageUrl || "",
                    title: document.getElementById('feedTitle').value || "Special Offer",
                    description: document.getElementById('feedDesc').value || "Click to see details"
                });

                document.getElementById('successMsg').style.display = 'block';
                btn.innerText = "Generate & Deploy Link";
                btn.disabled = false;
                alert('Campaign successfully created!');
            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
