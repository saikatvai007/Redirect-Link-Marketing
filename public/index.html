<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChobiLink - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #1a1a1a; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        h2 { text-align: center; font-size: 26px; font-weight: 700; margin-bottom: 25px; color: #fff; }
        .form-card { background-color: #121212; border: 1px solid #2d2d2d; border-radius: 12px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #bbb; }
        input { width: 100%; background-color: #2a2a2a; border: 1px solid #444444; border-radius: 6px; padding: 12px; color: #ffffff; font-size: 14px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #2563eb; }
        
        .pass-group { border: 1px solid #3b82f6; padding: 10px; border-radius: 8px; margin-bottom: 20px; background: #1e3a8a33; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .submit-btn { flex: 2; background-color: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .clear-btn { flex: 1; background-color: #333; color: white; border: 1px solid #444; padding: 14px; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .submit-btn:disabled { background-color: #555; cursor: not-allowed; }

        #copyBtn { display: none; width: 100%; background-color: #059669; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; text-align: center; }
        #copyBtn.copied { background-color: #10b981; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ChobiLink Admin</h2>

        <form class="form-card" id="campaignForm">
            <div class="form-group pass-group">
                <label style="color: #60a5fa;">Admin Access Key *</label>
                <input type="password" id="adminPass" placeholder="Enter Secret Password" required>
            </div>

            <div class="form-group">
                <label>Short Code Path </label>
                <input type="text" id="shortCode" placeholder="e.g. specialized-deal" required>
            </div>

            <div class="form-group">
                <label>Destination Target URL </label>
                <input type="url" id="targetUrl" placeholder="https://your-offer-link.com" required>
            </div>

            <div class="form-group">
                <label>Image URL </label>
                <input type="url" id="imageUrl" placeholder="https://site.com/image.jpg" required>
            </div>

            <div class="form-group">
                <label>Title </label>
                <input type="text" id="feedTitle" placeholder="Catchy offer title">
            </div>

            <div class="form-group">
                <label>Description </label>
                <input type="text" id="feedDesc" placeholder="Brief description for preview">
            </div>

            <div class="btn-group">
                <button type="submit" class="submit-btn" id="submitBtn">Generate & Deploy</button>
                <button type="button" class="clear-btn" id="clearBtn">Clear</button>
            </div>

            <button type="button" id="copyBtn">Click to Copy Link</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔥 আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCUcEwxRKj4HLaFjVCUu5QAegU1vlxZowo",
            authDomain: "campaign-link-gen.firebaseapp.com",
            databaseURL: "https://campaign-link-gen-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "campaign-link-gen",
            storageBucket: "campaign-link-gen.firebasestorage.app",
            messagingSenderId: "490906728973",
            appId: "1:490906728973:web:7ec5eed156d6f90bd9f344",
            measurementId: "G-41FXXYL6M1"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 🛡️ আপনার গোপন পাসওয়ার্ড এখানে সেট করুন
        const SECRET_PASSWORD = "আপনার_পাসওয়ার্ড_এখানে_দিন"; 

        const form = document.getElementById('campaignForm');
        const submitBtn = document.getElementById('submitBtn');
        const copyBtn = document.getElementById('copyBtn');
        let finalGeneratedLink = "";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // ১. পাসওয়ার্ড চেক
            const userPass = document.getElementById('adminPass').value;
            if (userPass !== SECRET_PASSWORD) {
                alert("❌ Wrong Password! Access Denied.");
                return;
            }

            submitBtn.innerText = "Deploying...";
            submitBtn.disabled = true;

            const shortCode = document.getElementById('shortCode').value.trim().replace(/\s+/g, '-').toLowerCase();
            const domain = window.location.origin;
            const longUrl = `${domain}/l/${shortCode}`;

            try {
                // ২. ফায়ারবেজে ডেটা সেভ
                await set(ref(database, 'campaigns/' + shortCode), {
                    targetUrl: document.getElementById('targetUrl').value,
                    imageUrl: document.getElementById('imageUrl').value,
                    title: document.getElementById('feedTitle').value || "Special Offer",
                    description: document.getElementById('feedDesc').value || "Details",
                    timestamp: Date.now()
                });

                // ৩. Cleanuri API দিয়ে শর্ট করার চেষ্টা (Fallback সহ)
                try {
                    const response = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://cleanuri.com/api/v1/shorten"), {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: "url=" + encodeURIComponent(longUrl)
                    });
                    
                    const resData = await response.json();
                    
                    if (resData.result_url) {
                        finalGeneratedLink = resData.result_url;
                        submitBtn.innerText = "Success (Short Link)";
                    } else {
                        throw new Error("API Limit");
                    }
                } catch (apiErr) {
                    // Fallback: যদি এপিআই কাজ না করে তবে মেইন লিঙ্ক দিবে
                    finalGeneratedLink = longUrl;
                    submitBtn.innerText = "Success (Main Link)";
                }

                // ৪. কপি বাটন দেখানো
                copyBtn.style.display = "block";
                copyBtn.innerText = "Click to Copy Link";
                copyBtn.classList.remove('copied');

            } catch (error) {
                alert("Database Error: " + error.message);
                submitBtn.innerText = "Generate & Deploy";
                submitBtn.disabled = false;
            }
        });

        // কপি বাটন লজিক
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(finalGeneratedLink).then(() => {
                copyBtn.innerText = "Link Copied!";
                copyBtn.classList.add('copied');
                setTimeout(() => { copyBtn.innerText = "Copy Link Again"; }, 2000);
            });
        });

        // ক্লিয়ার বাটন লজিক
        document.getElementById('clearBtn').addEventListener('click', () => {
            form.reset();
            copyBtn.style.display = "none";
            submitBtn.innerText = "Generate & Deploy";
            submitBtn.disabled = false;
            finalGeneratedLink = "";
        });
    </script>
</body>
</html>
